<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Realistic Ship Instrument Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gauges-container">
        <div class="gauge-unit"><canvas id="wind-dir-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="wind-speed-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="ship-speed-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="rudder-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="rot-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="rpm-canvas" width="160" height="160"></canvas></div>
        <div class="gauge-unit"><canvas id="clock-canvas" width="160" height="160"></canvas></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
